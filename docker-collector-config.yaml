# Collector configuration for Docker Compose
# Exporters point to the grafana service by hostname.

receivers:
  anthropic:
    endpoint: "0.0.0.0:4319"
    anthropic_api: "https://api.anthropic.com"

exporters:
  debug:
    verbosity: detailed

  otlp_grpc:
    endpoint: "grafana:4317"
    tls:
      insecure: true

processors:
  batch: {}

  # Delta-to-cumulative converts delta temporality metrics to cumulative.
  # Required by backends like Grafana Cloud and Prometheus that expect cumulative temporality.
  deltatocumulative: {}

service:
  pipelines:
    traces:
      receivers: [anthropic]
      processors: [batch]
      exporters: [debug, otlp_grpc]
    metrics:
      receivers: [anthropic]
      processors: [deltatocumulative, batch]
      exporters: [debug, otlp_grpc]
    logs:
      receivers: [anthropic]
      processors: [batch]
      exporters: [debug, otlp_grpc]
